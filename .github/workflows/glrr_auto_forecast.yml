name: GLRR Automated Cloud Forecast Engine

on:
  schedule:
    # Triggers at the top of every single hour automatically in the cloud
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually hit run from your phone/browser anytime

jobs:
  run-forecast:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision numpy matplotlib cartopy requests

    - name: Run Dynamic Operational Forecast
      run: |
        python cloud_live_forecast.py

    - name: Push Generated Maps to Repo Storage
      run: |
        git config --global user.name "GLRR-Bot"
        git config --global user.email "bot@glrr.ai"
        git add outputs/ || true
        git commit -m "Automated Cycle Run: Synced Latest Forecast Matrix Map" || exit 0
        git push